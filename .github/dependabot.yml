version: 2
updates:
  # Root Cargo workspace (rust/ crates)
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      # DataFusion, Arrow, and object_store are released and bumped together
      datafusion:
        patterns:
          - "datafusion*"
          - "arrow*"
          - "parquet*"
          - "object_store"
      rust-dependencies:
        patterns:
          - "*"

  # Python binding Cargo project (excluded from the root workspace)
  - package-ecosystem: cargo
    directory: "/python"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      # DataFusion, Arrow, and object_store are released and bumped together
      datafusion:
        patterns:
          - "datafusion*"
          - "arrow*"
          - "parquet*"
          - "object_store"
      python-rust-dependencies:
        patterns:
          - "*"

  # GitHub Actions used in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
